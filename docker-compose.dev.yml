services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    env_file:
      - ./backend/.env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://127.0.0.1:8123/ping || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - short-url-network
    restart: unless-stopped

  # anvil-node:
  #   image: ghcr.io/foundry-rs/foundry:latest
  #   ports:
  #     - "8545:8545"
  #   entrypoint: [ "anvil", "--host", "0.0.0.0" ]
  #   healthcheck:
  #     test: [ "CMD", "cast", "block-number", "--rpc-url", "http://localhost:8545" ]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 10
  #     start_period: 15s
  #   restart: unless-stopped

  deploy-contracts:
    build:
      context: ./contracts
      dockerfile: Dockerfile.dev
    volumes:
      - ./contracts:/app
      - /app/node_modules
      - dex_data:/shared
    env_file:
      - ./contracts/.env
    environment:
      - HARDHAT_RPC_URL=http://anvil-node:8545
      - OUTPUT_FILE=/shared/.dex.addresses
    command: >
      sh -c '
        ( [ -d node_modules/hardhat ] || npm install ) &&
        echo "Waiting for anvil-node..." &&
        npx wait-on tcp:anvil-node:8545 &&
        echo "Deploying DEX contracts..." &&
        npx hardhat run scripts/v2-deploy-dev.ts --network localhost &&
        echo "=== Deployed Addresses ===" &&
        cat /shared/.dex.addresses &&
        echo "==========================" &&
        echo "Deployment complete!"
      '
    networks:
      - short-url-network

  clickhouse-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile.migrate
    volumes:
      - ./backend/db/migrations:/migrations
    env_file:
      - ./backend/.env
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      - short-url-network
    entrypoint: []
    command: sh -c 'migrate -path=/migrations/ -database "clickhouse://clickhouse:9000?username=$${CLICKHOUSE_USER}&password=$${CLICKHOUSE_PASSWORD}&database=$${CLICKHOUSE_DB}&x-multi-statement=true" up'

  backend-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - dex_data:/shared
      - web3_data:/shared_s3
    env_file:
      - ./backend/.env
    ports:
      - "8081:8081"
    depends_on:
      clickhouse:
        condition: service_healthy
      deploy-contracts:
        condition: service_completed_successfully
      clickhouse-migrate:
        condition: service_completed_successfully
    networks:
      - short-url-network
    restart: unless-stopped

  backend-indexer:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/app
      - dex_data:/shared
      - web3_data:/shared_s3
    env_file:
      - ./backend/.env
    environment:
      - APP_MODE=indexer
    command: >
      sh -c '
        echo "Waiting for backend-api..." &&
        sleep 5 &&
        exec sh /app/entrypoint.dev.sh
      '
    depends_on:
      clickhouse:
        condition: service_healthy
      backend-api:
        condition: service_started
    networks:
      - short-url-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend-api
    networks:
      - short-url-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-api
    networks:
      - short-url-network
    restart: unless-stopped

volumes:
  clickhouse_data:
  dex_data:
  web3_data:
    name: short-url-generator_web3_data
    external: true

networks:
  short-url-network:
    external: true

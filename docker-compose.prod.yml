services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.3-alpine
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    env_file:
      - ./backend/.env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: [ "CMD-SHELL", "wget --spider -q http://localhost:8123/ping || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  clickhouse-migrate:
    image: ghcr.io/ras1putra/defi-amm-dex/clickhouse-migrate:latest
    env_file:
      - ./backend/.env
    depends_on:
      clickhouse:
        condition: service_healthy
    entrypoint: []
    command: sh -c 'migrate -path=/migrations/ -database "clickhouse://clickhouse:9000?username=$${CLICKHOUSE_USER}&password=$${CLICKHOUSE_PASSWORD}&database=$${CLICKHOUSE_DB}&x-multi-statement=true" up'

  backend-api:
    image: ghcr.io/ras1putra/defi-amm-dex/backend:latest
    env_file:
      - ./backend/.env
    command: ["/app/api"]
    depends_on:
      clickhouse:
        condition: service_healthy
      clickhouse-migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  backend-indexer:
    image: ghcr.io/ras1putra/defi-amm-dex/backend:latest
    env_file:
      - ./backend/.env
    command: ["/app/indexer"]
    depends_on:
      clickhouse:
        condition: service_healthy
      backend-api:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  frontend:
    image: ghcr.io/ras1putra/defi-amm-dex/frontend:latest
    depends_on:
      - backend-api
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend-api
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    restart: unless-stopped

volumes:
  clickhouse_data:

name: Build and Push Docker Images to GHCR

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build and Push DEX Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Downcase Owner Name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: "${{ github.repository_owner }}"

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ==============================
      # Build & Push DeFi AMM DEX Images
      # ==============================

      - name: Build and push DEX Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/backend:latest
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push DEX Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${{ secrets.WALLETCONNECT_PROJECT_ID }}
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/frontend:latest
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push DEX Clickhouse Migrate
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.migrate
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/clickhouse-migrate:latest
            ghcr.io/${{ env.OWNER_LC }}/defi-amm-dex/clickhouse-migrate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
